<!-- Homepage / Splash Screen -->
<section id="homepage" class="px-4 slide-left-enter">
  <div class="text-center hovered-element">
    <h1>
      <span id="titulo" class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600">
        Portfolio.exe</span>
      <span class="animate-pulse" style="font:1.5em sans-serif; font-weight: bold;">_</span>
    </h1>
    <h2 id="texto" style="font-family: monospace;padding-top: 3%;">
      Bienvenido a mi portafolio digital, <br> donde la creatividad y la tecnología se encuentran.
    </h2>

    <!-- Video Section -->
    <div class="video-container mt-4" *ngIf="!cargando">
      <!-- Mostrar video si existe -->
      <div *ngIf="tieneVideo && videoPath" class="video-wrapper">
      
         <h3 class="video-title mb-3" style="font-family: monospace; color: #fff;">
          Video de presentación
        </h3>
        <!--modificar para que se autoreproduzca y permita varios formatos de video 
        (mp4, webm, ogv)-->
        <video 
          [src]="videoPath"
          class="video-player"
          controls
          controlsList="nodownload"
          autoplay>
          Tu navegador no soporta el elemento de video.
        </video>
      </div>
      
      <!-- Mensaje si no hay video -->
      <div *ngIf="!tieneVideo && !cargando" class="no-video-message">
        <i class="fas fa-video-slash" style="font-size: 3rem; color: #fff; margin-bottom: 1rem;"></i>
        <p style="color: #fff; font-family: monospace;">
          No hay video de presentación disponible
        </p>
      </div>
      
      <!-- Indicador de carga -->
      <div *ngIf="cargando" class="loading-spinner">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>
      
      <!-- Mensaje de error -->
      <div *ngIf="errorVideo" class="error-message">
        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: #ffc107;"></i>
        <p style="color: #fff; font-family: monospace;">
          Error al cargar el video. Por favor, intenta más tarde.
        </p>
      </div>
    </div>

    <button id="enter-button" class="btn text-lg group float-animation" routerLink="/perfilUsuario">
      <span class="boton-inicio"> Ingresar </span>
      <i class="fas fa-arrow-right ml-2 group-hover:ml-3 transition-all"></i>
    </button>
  </div>
</section>
